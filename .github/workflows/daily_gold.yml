name: Daily Gold Price Update

on:
  schedule:
    # 03:00 UTC = 10:00 ICT (Asia/Ho_Chi_Minh, UTC+7)
    - cron: '0 3 * * *'
  workflow_dispatch:   # allow manual trigger from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit prices.json back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-actions.txt

      - name: Install dependencies
        run: pip install -r requirements-actions.txt

      - name: Fetch prices & send email
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/fetch_and_update.py

      - name: Commit updated prices.json
        run: |
          git config user.name  "gold-tracker[bot]"
          git config user.email "action@github.com"
          git add docs/data/prices.json
          git diff --staged --quiet || git commit -m "chore: gold prices $(date -u +'%Y-%m-%d')"
          git push
